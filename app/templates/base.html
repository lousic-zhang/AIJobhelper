<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIJobHelper</title>
    <link rel="stylesheet" href="/static/style.css?v=20260427a">
</head>
<body>
    <header class="topbar">
        <div class="brand">AIJobHelper</div>
        <nav class="nav">
            {% if current_user %}
            <a href="/resume" class="{% if active == 'resume' %}active{% endif %}">个人简历</a>
            <a href="/applications" class="{% if active == 'applications' %}active{% endif %}">投递记录</a>
            <a href="/knowledge" class="{% if active == 'knowledge' %}active{% endif %}">岗位知识库</a>
            <a href="/job-matches" class="{% if active == 'job_matches' %}active{% endif %}">匹配岗位列表</a>
            <a href="/chat" class="{% if active == 'chat' %}active{% endif %}">智能求职助手</a>
            <span class="nav-user">{{ current_user.nickname or current_user.email }}</span>
            <form method="post" action="/auth/logout" class="logout-form">
                <button type="submit" class="nav-link-button">退出登录</button>
            </form>
            {% else %}
            <a href="/login" class="{% if active == 'login' %}active{% endif %}">登录</a>
            <a href="/register" class="{% if active == 'register' %}active{% endif %}">注册</a>
            {% endif %}
        </nav>
    </header>
    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
