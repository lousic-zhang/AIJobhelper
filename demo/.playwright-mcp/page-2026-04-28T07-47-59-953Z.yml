          - generic [ref=e559]: 职位描述
          - generic [ref=e560]: 1. 负责游戏引擎及其工具链的产品设计与功能规划，覆盖从需求调研、原型验证到推动研发落地的完整链路； 2. 深入项目组一线，发掘引擎与资产生产流程中的效率痛点，将业务需求精准抽象为产品方案； 3. 将 AI 与大模型技术引入引擎工具生态——能够独立搭建 AI 原型（如 Prompt 工程、RAG、Agent 工作流），并推动其在真实项目中落地； 4. 持续优化引擎工具的交互设计与用户体验，面向程序、美术、策划等多角色用户进行产品迭代。
        - generic [ref=e561]:
          - generic [ref=e563]: 任职资格
          - generic [ref=e564]: 1. 本科及以上学历，计算机、软件工程、AI、数学、物理等专业优先； 2. 熟悉至少一款主流游戏引擎（Unity / Unreal / 自研引擎），理解游戏资产生产流程（模型、贴图、动画、场景等）； 3. 了解主流大模型及 Agent 工作原理，有 AI 工具应用或开发实践（Prompt 工程 / LangChain / ComfyUI 等）； 4. 具备产品思维，善于从用户角色出发分析需求，有 PRD 撰写或原型设计经验者优先； 5. 沟通表达清晰，能在研发与业务之间高效传导信息；具备强烈自驱力与学习热情。 【加分项】 • 熟悉游戏引擎或有相关经验； • 有 AI 辅助美术内容生产（LoRA、ControlNet、文生图在游戏中的应用）实践； • 有技术策划、引擎 TD 或 TA 相关实习 / 项目经验。
