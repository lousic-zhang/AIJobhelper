          - generic [ref=e508]: 职位描述
          - generic [ref=e509]: 1.研究前沿AI Agent及AIGC技术，推动其在游戏研发管线中的落地应用，将技术转化为优化游戏生产效率和升级玩家体验的实际解决方案； 2.设计与开发基于AI Agent的游戏研发工具链，覆盖代码生成与审查、自动化测试与优化、策划配置生成、程序脚本生成、美术资产生成与处理等核心制作环节，构建可复用、可迭代的AI驱动研发工作流； 3.负责多模态内容生成的研发与应用工作，包括2D图像、视频、3D模型、动画等内容的生成、控制与优化；针对图像、视频、Mesh等多媒体数据，持续打磨生成质量与效率； 4.搭建相关数据集、工具链及自动化工作流程，赋能美术、程序、策划等内部团队，协同重构工业化管线，建立AI驱动的敏捷研发新模式； 5.与跨职能团队紧密合作，深入分析游戏研发中的实际痛点，设计并交付高效的技术解决方案，推动AI能力在真实项目中的规模化落地。
