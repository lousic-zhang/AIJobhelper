          - generic [ref=e513]: 1.计算机科学、人工智能、数学、统计学或相关专业背景； 2.熟悉大语言模型及AI Agent技术的原理、最新进展、能力边界和应用场景，包括但不限于RAG、Tool Use、Multi-Agent协作、Agentic Workflow等；或熟悉AIGC技术原理与最新进展，包括图像/视频/3D内容生成、多模态大模型、3D动作生成等方向； 3.熟练掌握PyTorch/TensorFlow等深度学习框架，熟悉当前主流2D/3D/动画生成模型或LLM/Agent训练与推理框架，具备模型训练、微调与可控推理的实战能力； 4.具备扎实的编程能力和良好的工程素养，能够借助AI编程工具提升开发效率，独立完成从数据处理到模型部署、或从原型开发到系统持续迭代的完整流程； 5.了解游戏引擎和游戏开发流程，具备跨领域技术视野；了解3D重建、游戏美术建模、3D动画生成、动捕数据处理流程者优先； 6.对AI与游戏结合的前沿探索有浓厚兴趣，愿意推动技术落地与创新发展。 【加分项】 1.在ICML、NeurIPS、AAAI、AAAI/SIGGRAPH等顶级会议或期刊上发表过相关论文； 2.有游戏开发或运营相关经验，或有AI Agent工具链在实际产品中落地的项目经验； 3.热爱游戏，对游戏行业有深入了解。
